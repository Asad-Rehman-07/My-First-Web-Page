	<form action="/server">

	    <label for="n">Name:</label>

	     Sex:
		 <input type="radio" id="m" name="sex" value="male">

		 <input type="radio" id="f" name="sex" value="female">
		 <label for="f">Female</label>
	  </div>

	<form action="/server">
	  <h2>Feedback Form</h2>
	  <div>
	     <label for="na">Name:</label>
		 <input type="text" id="na" name="name" placeholder="Write your name">
	  </div>
	  <div>

		 <label for="three">3</label> <br>
		 <input type="radio" id="four" name="rating" value="four">
		 <label for="four">4</label> <br>
